name: Android Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  unit-tests:
    uses: ./.github/workflows/android-tests.yml

  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks

      - name: Build release with Gradle
        env:
          KEYSTORE_PATH: keystore.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Prepare release artifacts
        run: |
          mkdir -p build/release-artifacts
          cp app/build/outputs/apk/release/app-release.apk "build/release-artifacts/MangaKo-${{ github.ref_name }}.apk"
          cp app/build/outputs/bundle/release/app-release.aab "build/release-artifacts/MangaKo-${{ github.ref_name }}.aab"

      - name: Upload private AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: MangaKo-${{ github.ref_name }}-aab
          path: build/release-artifacts/MangaKo-${{ github.ref_name }}.aab
          retention-days: 7

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/release-artifacts/MangaKo-${{ github.ref_name }}.apk
          generate_release_notes: true
